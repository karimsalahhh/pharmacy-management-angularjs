<!doctype html>
<html lang="en" ng-app="pharmacyApp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pharmacy Admin</title>

    <!-- !Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- !Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" href="assets/css/admin_style.css" />

    <!-- !Angular -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>

    <!-- !App -->
    <script src="app/app.module.js"></script>
    <script src="app/app.routes.js"></script>

    <!-- !Controllers -->
    <script src="app/controllers/admin/dashCTRL.js"></script>
    <script src="app/controllers/admin/statsCTRL.js"></script>
    <script src="app/controllers/admin/medsCTRL.js"></script>
    <script src="app/controllers/admin/prodsCTRL.js"></script>
    <script src="app/controllers/admin/customersCTRL.js"></script>
    <script src="app/controllers/admin/invoicesCTRL.js"></script>

    <!-- !Services -->
    <script src="app/services/medsService.js"></script>
    <script src="app/services/customersService.js"></script>
    <script src="app/services/invoicesService.js"></script>
    <script src="app/config/supabase.config.js"></script>
  </head>

  <body>
    <!-- !TOP NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-gradient navbar-dark shadow-sm">
      <div class="container-fluid">
        <a
          class="navbar-brand d-flex align-items-center"
          href="#!/admin/dashboard"
        >
          <i class="bi bi-prescription2 me-2"></i>
          <span>Pharmacy Admin</span>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="#!/admin/dashboard">
                <i class="bi bi-speedometer2 me-1"></i>Dashboard
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#!/admin/statistics">
                <i class="bi bi-bar-chart me-1"></i>Statistics
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#!/admin/medicines">
                <i class="bi bi-capsule me-1"></i>Inventory
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#!/admin/productSearch">
                <i class="bi bi-box-seam me-1"></i>Search
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#!/admin/customers">
                <i class="bi bi-people me-1"></i>Customers
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#!/admin/orders">
                <i class="bi bi-receipt me-1"></i>Create Order
              </a>
            </li>
          </ul>
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                id="userMenu"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                <i class="bi bi-person-circle"></i>
              </a>
              <ul
                class="dropdown-menu dropdown-menu-end"
                aria-labelledby="userMenu"
              >
                <li><a class="dropdown-item" href="#">Logout</a></li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- !PAGE CONTENT -->
    <div class="container-fluid p-4">
      <div ng-view></div>
    </div>

    <!-- !Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
