<div ng-controller="MedicineController">
  <h2>Medicines</h2>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>Item</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Expiry Date</th>
      </tr>
    </thead>
    <tbody>
      <tr ng-repeat="m in medicines">
        <td>{{ m.name }}</td>
        <td>{{ m.price }}</td>
        <td>{{ m.stock }}</td>
        <td>{{ m.expiry_date }}</td>
      </tr>
    </tbody>
  </table>
</div>
