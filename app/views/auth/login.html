<div
  class="row justify-content-center align-items-center"
  style="min-height: 80vh"
>
  <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
    <div class="card shadow-lg border-0 rounded-4">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <i class="bi bi-prescription2 fs-1 text-primary"></i>
          <h2 class="mt-3 mb-1">Pharmacy Admin Login</h2>
          <p class="text-muted mb-0">Sign in to access the admin dashboard</p>
        </div>

        <form ng-submit="login()">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input
              type="email"
              class="form-control form-control-lg"
              ng-model="loginData.email"
              placeholder="Enter admin email"
              autocomplete="email"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input
              type="password"
              class="form-control form-control-lg"
              ng-model="loginData.password"
              placeholder="Enter password"
              autocomplete="current-password"
              required
            />
          </div>

          <div class="alert alert-danger" ng-if="errorMessage">
            {{ errorMessage }}
          </div>

          <button
            type="submit"
            class="btn btn-primary btn-lg w-100"
            ng-disabled="isLoading"
          >
            <span ng-if="!isLoading">Login</span>
            <span ng-if="isLoading">Logging in...</span>
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
