<div class="container-fluid">
  <div class="mb-4">
    <h2 class="fw-bold mb-1">Customers</h2>
    <p class="text-muted mb-0">Manage customer profiles and contact details</p>
  </div>

  <form name="customerForm" novalidate class="card mb-4">
    <div class="card-body">
      <h5 class="mb-3">Add New Customer</h5>

      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Name</label>
          <input
            class="form-control"
            placeholder="Customer name"
            name="name"
            ng-model="newCustomer.name"
            required
            ng-minlength="2"
            ng-class="{'is-invalid': customerForm.name.$touched && customerForm.name.$invalid}"
          />
          <small
            class="text-danger"
            ng-show="customerForm.name.$touched && customerForm.name.$invalid"
          >
            Name is required.
          </small>
        </div>

        <div class="col-md-3">
          <label class="form-label">Phone</label>
          <input
            class="form-control"
            placeholder="Phone number"
            name="phone"
            ng-model="newCustomer.phone"
            required
            ng-class="{'is-invalid': customerForm.phone.$touched && customerForm.phone.$invalid}"
          />
          <small
            class="text-danger"
            ng-show="customerForm.phone.$touched && customerForm.phone.$invalid"
          >
            Phone is required.
          </small>
        </div>

        <div class="col-md-4">
          <label class="form-label">Email</label>
          <input
            class="form-control"
            type="email"
            placeholder="Email address"
            name="email"
            ng-model="newCustomer.email"
            required
            ng-class="{'is-invalid': customerForm.email.$touched && customerForm.email.$invalid}"
          />
          <small
            class="text-danger"
            ng-show="customerForm.email.$touched && customerForm.email.$invalid"
          >
            Enter a valid email.
          </small>
        </div>

        <div class="col-md-1 d-grid">
          <label class="form-label d-none d-md-block">&nbsp;</label>
          <button
            type="button"
            class="btn btn-primary"
            ng-click="addCustomer(customerForm)"
          >
            Add
          </button>
        </div>
      </div>
    </div>
  </form>

  <div class="card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-striped mb-0">
          <thead>
            <tr>
              <th>Name</th>
              <th>Phone</th>
              <th>Email</th>
              <th style="width: 140px">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr ng-repeat="c in customers">
              <td>{{ c.name }}</td>
              <td>{{ c.phone }}</td>
              <td>{{ c.email }}</td>
              <td>
                <button
                  class="btn btn-sm btn-outline-danger"
                  ng-click="deleteCustomer(c.id)"
                >
                  Delete
                </button>
              </td>
            </tr>
            <tr ng-if="customers.length === 0">
              <td colspan="4" class="text-center text-muted py-4">
                No customers available.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
