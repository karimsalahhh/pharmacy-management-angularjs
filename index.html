<!doctype html>
<html lang="en" ng-app="pharmacyApp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roshetety</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- !Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- !Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" href="assets/css/styles.css" />

    <!-- !Angular -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- !App -->
    <script src="app/app.module.js"></script>
    <script src="app/app.routes.js"></script>

    <!-- !Controllers -->
    <script src="app/controllers/appCTRL.js"></script>
    <script src="app/controllers/auth/loginCTRL.js"></script>
    <script src="app/controllers/admin/dashCTRL.js"></script>
    <script src="app/controllers/admin/statsCTRL.js"></script>
    <script src="app/controllers/admin/medsCTRL.js"></script>
    <script src="app/controllers/admin/customersCTRL.js"></script>
    <script src="app/controllers/admin/ordersCTRL.js"></script>
    <script src="app/controllers/admin/invoicesDetailsCTRL.js"></script>

    <!-- !Services -->
    <script src="app/services/authService.js"></script>
    <script src="app/services/medsService.js"></script>
    <script src="app/services/customersService.js"></script>
    <script src="app/services/ordersService.js"></script>
    <script src="app/services/insightsService.js"></script>
    <script src="app/config/supabase.config.js"></script>
  </head>

  <body
    ng-controller="AppController"
    class="app-shell"
    ng-class="{'login-shell': !showNavbar()}"
  >
    <!-- !TOP NAVBAR -->
    <nav class="navbar navbar-expand-lg app-navbar shadow-sm" ng-if="showNavbar()">
      <div class="container-fluid">
        <a
          class="navbar-brand d-flex align-items-center"
          href="#!/admin/dashboard"
        >
          <i class="bi bi-prescription2 me-2"></i>
          <span>Roshetety</span>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" ng-class="{'active': isActive('/admin/dashboard')}" href="#!/admin/dashboard">
                <i class="bi bi-speedometer2 me-1"></i>Dashboard
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" ng-class="{'active': isActive('/admin/statistics')}" href="#!/admin/statistics">
                <i class="bi bi-bar-chart me-1"></i>Statistics
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" ng-class="{'active': isActive('/admin/medicines')}" href="#!/admin/medicines">
                <i class="bi bi-capsule me-1"></i>Inventory
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" ng-class="{'active': isActive('/admin/customers')}" href="#!/admin/customers">
                <i class="bi bi-people me-1"></i>Customers
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" ng-class="{'active': isActive('/admin/orders')}" href="#!/admin/orders">
                <i class="bi bi-receipt me-1"></i>Create Order
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" ng-class="{'active': isActive('/admin/invoicesDetails')}" href="#!/admin/invoicesDetails">
                <i class="bi bi-journal-richtext me-1"></i>Manage Invoices
              </a>
            </li>
          </ul>
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                id="userMenu"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                <i class="bi bi-person-circle"></i>
              </a>
              <ul
                class="dropdown-menu dropdown-menu-end"
                aria-labelledby="userMenu"
              >
                <li>
                  <a class="dropdown-item" href="" ng-click="logout()"
                    >Logout</a
                  >
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- !PAGE CONTENT -->
    <main class="app-content" ng-class="{'content-login': !showNavbar()}">
      <div class="container-fluid p-4">
        <div ng-view></div>
      </div>
    </main>

    <!-- !Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
